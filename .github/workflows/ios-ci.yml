name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ci.yml"

defaults:
  run:
    working-directory: apps/ios

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Mint
        run: brew install mint

      - name: Cache Mint packages
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('apps/ios/Mintfile') }}

      - name: Bootstrap tools (XcodeGen, SwiftLint)
        run: mint bootstrap

      - name: SwiftLint
        run: mint run swiftlint --strict

      - name: Generate Xcode project
        run: mint run xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project Storylane.xcodeproj \
            -scheme Storylane \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project Storylane.xcodeproj \
            -scheme Storylane \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO
