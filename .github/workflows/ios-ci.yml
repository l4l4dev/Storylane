name: iOS CI

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/ios

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # Mint builds XcodeGen/SwiftLint from source; they require a Swift 6 toolchain.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Mint
        run: brew install mint

      - name: Cache Mint packages
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: ${{ runner.os }}-mint-${{ hashFiles('apps/ios/Mintfile') }}

      - name: Bootstrap tools (XcodeGen, SwiftLint)
        run: mint bootstrap

      - name: SwiftLint
        run: mint run swiftlint --strict

      # Config.xcconfig is gitignored; CI uses placeholder values (no network in build/tests).
      - name: Create Config.xcconfig
        run: cp Config.xcconfig.example Config.xcconfig

      - name: Generate Xcode project
        run: mint run xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project Storylane.xcodeproj \
            -scheme Storylane \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project Storylane.xcodeproj \
            -scheme Storylane \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO
