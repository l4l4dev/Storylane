name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-ci.yml"

jobs:
  ci:
    name: Build & Test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project apps/ios/Storylane.xcodeproj \
            -scheme Storylane

      - name: Build
        run: |
          xcodebuild build \
            -project apps/ios/Storylane.xcodeproj \
            -scheme Storylane \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project apps/ios/Storylane.xcodeproj \
            -scheme Storylane \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            CODE_SIGNING_ALLOWED=NO
