name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web-ci.yml"

jobs:
  ci:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (core)
        run: pnpm --filter @storylane/core exec tsc --noEmit

      - name: Test (core)
        run: pnpm --filter @storylane/core run test

      - name: Type check (web)
        run: pnpm --filter web exec tsc --noEmit

      - name: Lint (web)
        run: pnpm --filter web run lint

      - name: Run tests (web)
        run: pnpm --filter web run test

      # Type checking a Server Component doesn't catch a browser-only
      # dependency leaking into the server bundle (TASK-67 regression: an
      # @dnd-kit import in a Server-Component-imported module broke build
      # but not tsc/eslint/vitest) — build is the only gate that catches it.
      - name: Build (web)
        run: pnpm --filter web run build
