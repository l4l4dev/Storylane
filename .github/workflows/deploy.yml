name: Deploy

# Production consistency: migrations and Edge Functions are applied BEFORE the
# app deploy starts. Vercel's Git auto-deploy for main is disabled in
# apps/web/vercel.json, so the Deploy Hook at the end of this job is the only
# thing that puts new app code live — new code can never run against an old
# schema. See DEPLOY.md for the one-time setup.

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref iwmacbzlfeufzedjguce
          supabase db push

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy

      - name: Trigger Vercel production deploy
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
