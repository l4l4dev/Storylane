included:
  - Storylane
  - Tests

excluded:
  - Storylane.xcodeproj

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping       # CLAUDE.md: no force unwrap — use guard let / if let
  - first_where
  - sorted_first_last
  - contains_over_first_not_nil
  - redundant_nil_coalescing
  - closure_spacing

disabled_rules:
  - todo

line_length:
  warning: 120
  error: 200
  ignores_comments: true

identifier_name:
  min_length: 2
  excluded:
    - id

type_name:
  min_length: 3

function_body_length:
  warning: 60
  error: 120
