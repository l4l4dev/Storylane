name: Storylane

options:
  bundleIdPrefix: dev.l4l4
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.48.0"

targets:
  Storylane:
    type: application
    platform: iOS
    sources:
      - path: Storylane
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: Storylane/Info.plist
      properties:
        CFBundleDisplayName: Storylane
        UILaunchScreen: {}
        # Injected from Config.xcconfig at build time and read via Bundle.main.
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_PUBLISHABLE_KEY: $(SUPABASE_PUBLISHABLE_KEY)
        # Custom URL scheme used as the OAuth callback for ASWebAuthenticationSession.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - dev.l4l4.storylane
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.l4l4.Storylane
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          export PATH="$PATH:/opt/homebrew/bin"
          if which mint >/dev/null; then
            mint run swiftlint
          else
            echo "warning: mint not installed — run 'brew install mint && mint bootstrap' in apps/ios"
          fi

  StorylaneTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Storylane
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Storylane:
    build:
      targets:
        Storylane: all
        StorylaneTests: [test]
    test:
      targets:
        - StorylaneTests
